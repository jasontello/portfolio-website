<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="./style.css" />

    <title>Jason Tello Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="intro-loader" aria-label="Loading portfolio" role="status" aria-live="polite">
      <section class="boot-loader" aria-hidden="true">
        <div class="boot-loader__screen">
          <div class="boot-loader__frame"></div>
          <div class="boot-loader__ring"></div>
          <img class="boot-loader__gif" src="./images/intro-ascii.gif" alt="">
          <div class="boot-loader__panel"></div>
        </div>
      </section>
    </div>
    <nav class="main-navigation">
      <header> 
        <div class="about"> 
          <h1 id="name">Jason Tello</h1>
          <p>I’m a recent CS graduate based in the Bay Area in California.</p>
          <p>I design and build minimal websites focused on aesthetic, clarity, and brand identity.</p>
          <p>You can reach me on <a href="https://www.linkedin.com/in/jason-tello-123888235/" target="_blank" >LinkedIn</a> or email me at jasontello2003@gmail.com.</p>
        </div>
        <ul class="nav-links">
          <li class="project-section">
            <a class="nav-link-fx">Projects</a>
          </li>
          <li class="playground-section">
            <a class="nav-link-fx">Sandbox</a>
          </li>
          <li class="resume-section">
            <a class="nav-link-fx">Resume</a>
          </li>
        </ul>
      </header>
      <footer>
        <img id="bottomleft-corner" class="triangle" src="./images/CornerTriangle.svg" alt="corner image">
      </footer>
    </nav>
    <div class="main-content">
      <div class="headerright-section">
        <img id="topright-corner" class="triangle" src="./images/topright-cornertriangle.svg" alt="corner image">
      </div>
      <div class="workinprogress">
        <img id="sign" src="./images/dithered_ascii 2.svg">
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
